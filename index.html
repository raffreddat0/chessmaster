<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Master</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
        integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2hBLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU"
        crossorigin="anonymous">

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"
          integrity="sha384-ZvpUoO/+PpLXR1lu4jmpXWu80pZlYUAfxl5NsBMWOEPSjUn/6Z/hRTt8+pR6L4N2"
          crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"
          integrity="sha384-8Vi8VHwn3vjQ9eUHUxex3JSN/NFqUg3QbPyX8kWyb93+8AC/pPWTzj+nHtbC5bxD"
          crossorigin="anonymous"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"
          integrity="sha384-s3XgLpvmHyscVpijnseAmye819Ee3yaGa8NxstkJVyA6nuDFjt59u1QvuEl/mecz"
          crossorigin="anonymous"></script>

  <style>
    :root {
      --bg-color: #0c0c0c;
      --card-bg: #161616;
      --primary: oklch(48% .23 264);
      --primary-hover: oklch(42% .23 264);
      --highlight: oklch(80.9% .105 251.813);
      --text-main: #ffffff;
      --text-muted: #a1a1aa;
      --error: #ef4444;
      --success: #22c55e;
      --border: #27272a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      line-height: 1.5;
      position: relative;
    }

    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.2;
      pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1.5px, transparent 1.5px),
        linear-gradient(90deg, var(--border) 1.5px, transparent 1.5px);
      background-size: 100px 100px;
    }

    .bg-pattern::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(rgba(39, 39, 42, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(39, 39, 42, 0.3) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    #gameLogo {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      z-index: 200;
      cursor: pointer;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
      transition: transform 0.2s ease;
    }

    #gameLogo:hover {
      transform: translateX(-50%) scale(1.05);
    }

    #gameHeader {
      position: fixed;
      top: 7rem;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 100;
      display: none;
      pointer-events: none;
    }

    #gameHeader h2 {
      font-family: 'IBM Plex Serif', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.2rem;
      color: var(--text-main);
      opacity: 1;
      text-transform: uppercase;
      margin: 0;
    }

    h1 {
      font-family: 'IBM Plex Serif', serif;
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      background: linear-gradient(to bottom, #fff 40%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 10;
    }

    .hero-container {
      text-align: center;
      max-width: 800px;
      padding: 2rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.25rem;
      margin-bottom: 2.5rem;
    }

    #container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 2.5rem;
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      box-shadow:
        0 0 0 1px var(--border),
        0 20px 40px rgba(0, 0, 0, 0.6),
        0 10px 20px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      text-align: left;
    }

    label {
      font-size: 0.96rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    input[type="text"] {
      background: #000;
      border: 1px solid var(--border);
      color: #fff;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      width: 100%;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    button {
      background-color: var(--primary);
      color: white;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      transition: all 0.1s ease;
      box-shadow: hsl(219, 93%, 20%) 0 -2px 0 0 inset, rgba(0, 0, 0, 0.4) 0 1px 3px 0;
      user-select: none;
    }

    button:hover {
      background-color: var(--primary-hover);
      box-shadow: none;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: none;
    }

    #board {
      width: 40vw;
      max-width: 100%;
      display: none;
      box-shadow:
        0 0 0 1px var(--border),
        0 20px 50px -12px rgba(0, 0, 0, 0.8),
        0 10px 20px -5px rgba(0, 0, 0, 0.5);
    }

    #historyPanel {
      position: fixed;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 320px;
      height: 70vh;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      display: none;
      flex-direction: column;
      gap: 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 100;
    }

    .history-header {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    #gameTimerDisplay {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--primary);
      text-align: center;
      padding: 1rem;
      background: rgba(0,0,0,0.3);
      border-radius: 0.5rem;
      border: 1px solid var(--border);
    }

    #moveListContent {
      flex-grow: 1;
      overflow-y: auto;
      background: rgba(0,0,0,0.2);
      border-radius: 0.5rem;
      padding: 0.75rem;
      font-size: 0.9rem;
      display: grid;
      grid-template-columns: 30px 1fr 1fr;
      gap: 0.5rem;
      align-content: flex-start;
    }

    #moveListContent::-webkit-scrollbar {
      width: 6px;
    }

    #moveListContent::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .move-item {
      color: var(--text-main);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      text-align: center;
    }

    .move-item:hover {
      background: var(--primary);
    }

    .move-item.active {
      background: var(--primary) !important;
      color: white !important;
    }

    #historyControls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 0.75rem;
      background: rgba(0,0,0,0.3);
      border-radius: 0.5rem;
      margin-top: 0.5rem;
      border: 1px solid var(--border);
    }

    .nav-btn {
      background: transparent;
      color: var(--text-muted);
      border: none;
      padding: 0.4rem;
      border-radius: 0.4rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    .nav-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.05);
      color: var(--text-main);
      transform: scale(1.1);
    }

    .nav-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .nav-btn:disabled {
      opacity: 0.15;
      cursor: not-allowed;
    }

    .nav-btn.active {
      color: var(--primary);
    }

    .move-num {
      color: var(--text-muted);
      text-align: right;
      padding-right: 0.5rem;
    }

    #btnBackToPresent {
      display: none;
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.6rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      margin-top: 0.5rem;
    }

    #btnBackToPresent.visible {
      display: block;
    }

    @media (max-width: 1200px) {
      #historyPanel {
        display: none !important;
      }
    }

    .white-1e1d7 {
      background-color: #ffffff !important;
      color: var(--primary) !important;
    }

    .black-3c85d {
      background-color: var(--primary) !important;
      color: #ffffff !important;
    }

    .highlight {
      box-shadow: inset 0 0 0 5px var(--highlight) !important;
    }

    .highlight1-32417 {
      box-shadow: inset 0 0 0 5px var(--highlight) !important;
    }

    .highlight2-9c5d2 {
      box-shadow: inset 0 0 0 5px var(--highlight) !important;
    }

    #error {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 500;
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      white-space: nowrap;
      z-index: 20;
    }

    #error.error {
      color: var(--error);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    #error.success {
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    #island {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 600;
      color: var(--text-main);
      display: none;
      z-index: 100;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    #promotionMenu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 1rem;
      border-radius: 1rem;
      z-index: 1000;
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    #promotionMenu button {
      background: #27272a;
      padding: 0.5rem;
    }

    #promotionMenu img {
      width: 60px;
      height: 60px;
    }

    .highlight-square {
      background-color: var(--highlight);
      opacity: 0.8;
      border-radius: 50%;
      position: absolute;
      width: 20%;
      height: 20%;
      top: 40%;
      left: 40%;
      z-index: 1;
      pointer-events: none;
      box-shadow: 0 0 10px var(--highlight);
    }

    @media (max-width: 640px) {
      #gameLogo {
        width: 60px;
        height: 60px;
        top: 1rem;
      }
      h1 {
        font-size: 2.8rem;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      #board {
        width: 95vw;
        margin: 1rem auto;
      }
      #island {
        bottom: 1.5rem;
        padding: 0.6rem 1.2rem;
        font-size: 0.85rem;
        width: auto;
        max-width: 90vw;
      }
    }
  </style>
</head>
<body>

  <div class="bg-pattern"></div>

  <img id="gameLogo" alt="Chess Master Logo" onclick="window.location.href='/'">

  <div id="gameHeader">
    <h2>Chess Master</h2>
  </div>

  <div class="hero-container" id="hero">
    <h1>CHESS MASTER</h1>
    <p class="subtitle">“Challenge the Future, One Move at a Time”</p>
    <div id="container">
      <div class="input-group">
        <label for="codeInput">Game Code</label>
        <input type="text" id="codeInput" placeholder="Enter code or just enter..." onkeydown="if (event.key === 'Enter') connectWithCode()">
      </div>
      <button onclick="connectWithCode()">
           <svg style="transform: rotate(-90deg);" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
           Enter Game
         </button>
      </div>
      <p id="error"></p>
    </div>

  <div id="board"></div>

  <div id="historyPanel">
    <div>
      <div class="history-header">Game Time</div>
      <div id="gameTimerDisplay">00:00</div>
    </div>
    <div style="flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;">
      <div class="history-header">Move History</div>
      <div id="moveListContent"></div>

      <div id="historyControls">
        <button class="nav-btn" id="btnFirstMove" onclick="showPastMove(0)" title="First Move">
          <svg viewBox="0 0 24 24"><path d="M18.41 16.59L13.82 12l4.59-4.59L17 6l-6 6 6 6zM6 6h2v12H6z"/></svg>
        </button>
        <button class="nav-btn" id="btnPrevMove" onclick="prevMove()" title="Previous Move">
          <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.82 12l4.59-4.59L14 6l-6 6 6 6z"/></svg>
        </button>
        <button class="nav-btn" id="btnAutoPlay" onclick="toggleAutoPlay()" title="Auto Play">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="nav-btn" id="btnNextMove" onclick="nextMove()" title="Next Move">
          <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </button>
        <button class="nav-btn" id="btnLastMove" onclick="backToPresent()" title="Current Position">
          <svg viewBox="0 0 24 24"><path d="M5.59 7.41L10.18 12l-4.59 4.59L7 18l6-6-6-6zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div id="promotionMenu"></div>
  <div id="island"></div>

  <script>
    function main(code) {
      var board = null;
      var game = new Chess();
      var state = 0;
      var level = 0;
      var startTime = Date.now();
      var timerInterval = null;
      var viewingIndex = -1;
      var autoPlayInterval = null;

      function updateHistory() {
        const history = game.history({ verbose: true });
        const moveList = document.getElementById('moveListContent');
        moveList.innerHTML = '';

        for (let i = 0; i < history.length; i += 2) {
          const moveNum = Math.floor(i / 2) + 1;

          const numSpan = document.createElement('span');
          numSpan.className = 'move-num';
          numSpan.textContent = `${moveNum}.`;
          moveList.appendChild(numSpan);

          const whiteMove = document.createElement('span');
          whiteMove.className = 'move-item';
          whiteMove.textContent = history[i].from + history[i].to;
          whiteMove.onclick = () => showPastMove(i + 1);
          if (viewingIndex === i + 1 || (viewingIndex === -1 && i + 1 === history.length)) {
            whiteMove.classList.add('active');
          }
          moveList.appendChild(whiteMove);

          if (history[i + 1]) {
            const blackMove = document.createElement('span');
            blackMove.className = 'move-item';
            blackMove.textContent = history[i + 1].from + history[i + 1].to;
            blackMove.onclick = () => showPastMove(i + 2);
            if (viewingIndex === i + 2 || (viewingIndex === -1 && i + 2 === history.length)) {
              blackMove.classList.add('active');
            }
            moveList.appendChild(blackMove);
          }
        }

        document.getElementById('btnFirstMove').disabled = (history.length === 0 || viewingIndex === 0);
        document.getElementById('btnPrevMove').disabled = (history.length === 0 || viewingIndex === 0);
        document.getElementById('btnNextMove').disabled = (viewingIndex === -1 || viewingIndex === history.length);
        document.getElementById('btnLastMove').disabled = (viewingIndex === -1);

        if (viewingIndex === -1) {
          moveList.scrollTop = moveList.scrollHeight;

          if (history.length > 0) {
            const lastMove = history[history.length - 1];
            removeHighlights();
            $board.find('.square-' + lastMove.from).addClass('highlight');
            $board.find('.square-' + lastMove.to).addClass('highlight');
          }
        }
      }

      window.prevMove = function() {
        const history = game.history();
        let targetIndex = viewingIndex === -1 ? history.length - 1 : viewingIndex - 1;
        if (targetIndex >= 0) {
          showPastMove(targetIndex);
        }
      }

      window.nextMove = function() {
        const history = game.history();
        if (viewingIndex !== -1 && viewingIndex < history.length) {
          showPastMove(viewingIndex + 1);
        }
      }

      window.toggleAutoPlay = function() {
        const btn = document.getElementById('btnAutoPlay');
        const playIcon = document.getElementById('playIcon');
        if (autoPlayInterval) {
          clearInterval(autoPlayInterval);
          autoPlayInterval = null;
          playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
          btn.classList.remove('active');
        } else {
          const history = game.history();
          if (history.length === 0) return;

          if (viewingIndex === -1 || viewingIndex === history.length) {
            showPastMove(0);
          }

          playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
          btn.classList.add('active');
          autoPlayInterval = setInterval(() => {
            const currentHistory = game.history();
            if (viewingIndex < currentHistory.length) {
              nextMove();
            } else {
              toggleAutoPlay();
            }
          }, 1000);
        }
      }

      window.showPastMove = function(index) {
        const history = game.history({ verbose: true });

        if (index === history.length || index === -1) {
          backToPresent();
          return;
        }

        viewingIndex = index;
        const tempGame = new Chess();
        for (let i = 0; i < index; i++) {
          tempGame.move(history[i]);
        }
        board.position(tempGame.fen());

        removeHighlights();
        if (index > 0) {
          const lastMove = history[index - 1];
          $board.find('.square-' + lastMove.from).addClass('highlight');
          $board.find('.square-' + lastMove.to).addClass('highlight');
        }

        updateHistory();
        draggable = false;
      }

      window.backToPresent = function() {
        if (autoPlayInterval) toggleAutoPlay();
        viewingIndex = -1;
        board.position(game.fen());

        removeHighlights();
        const history = game.history({ verbose: true });
        if (history.length > 0) {
          const lastMove = history[history.length - 1];
          $board.find('.square-' + lastMove.from).addClass('highlight');
          $board.find('.square-' + lastMove.to).addClass('highlight');
        }

        updateHistory();
        draggable = true;
      }

      function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        startTime = Date.now();
        timerInterval = setInterval(() => {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          const hours = Math.floor(elapsed / 3600);
          const mins = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
          const secs = (elapsed % 60).toString().padStart(2, '0');

          if (hours > 0) {
            document.getElementById('gameTimerDisplay').textContent = `${hours}:${mins}:${secs}`;
          } else {
            document.getElementById('gameTimerDisplay').textContent = `${mins}:${secs}`;
          }
        }, 1000);
      }

      const error = document.getElementById('error');
      error.style.display = 'none';
      error.textContent = '';

      const wsUrl = `ws${window.location.protocol === "https:" ? "s" : ""}://${window.location.host}?code=${code}`;
      const ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log(`Connected to WebSocket with code: ${code}`);
      };

      ws.onmessage = async (message) => {
        const move = message.data.toString();
        console.log(move);

        if (move.startsWith("error")) {
          const error = document.getElementById('error');
          error.textContent = move.replace("error ", "");
          error.className = 'error';
          error.style.display = 'block';
          return;
        }

        if (["valid", "invalid"].includes(move))
          return;

        if (move.startsWith("code")) {
          const gameCode = move.split(" ")[1];
          const island = document.getElementById('island');
          island.textContent = `Code: ${gameCode}`;
          island.style.display = 'block';

          board.orientation('white');
        }

        if (move === "stockfish") {
          level = Number(localStorage.getItem("level") || "1");
          ws.send("level " + level);
          return;
        }

        if (move === "start" || move.startsWith("code")) {
          console.log("Game started.");
          document.getElementById('hero').style.display = 'none';
          document.getElementById('gameHeader').style.display = 'block';
          document.getElementById('board').style.display = 'block';
          document.getElementById('historyPanel').style.display = 'flex';
          startTimer();
          updateHistory();
          return;
        }

        if (move.startsWith("position")) {
          game.load(move.replace("position ", ""));
          board.position(game.fen());
          updateHistory();
          return;
        }

        if (move === "win" || move === "lose" || move === "draw") {
          if (move === "win") {
            if (level > 0)
              localStorage.setItem("level", level + 1);
            state = 1;
          }
          if (move === "lose")
            state = 2;
          if (move === "draw")
            state = 3

          ws.close();
          return;
        }

        if (level > 0) {
          const island = document.getElementById('island');
          island.textContent = `Level: ${level}`;
          island.style.display = 'block';
        }

        const from = move.slice(0, 2);
        const to = move.slice(2, 4);
        const promotion = move.slice(4, 5);

        const moveResult = game.move({
          from: from,
          to: to,
          promotion: promotion
        });

        if (moveResult !== null) {
          if (viewingIndex !== -1) {
            viewingIndex = -1;
            document.getElementById('btnBackToPresent').classList.remove('visible');
            draggable = true;
          }

          await new Promise(r => setTimeout(r, 100));
          board.position(game.fen());
          updateHistory();
          removeHighlights();
          $board.find('.square-' + from).addClass('highlight');
          $board.find('.square-' + to).addClass('highlight');
          await new Promise(r => setTimeout(r, 150));
          draggable = true;
        } else {
          console.log('Invalid move:', move);
        }

      };

      ws.onclose = () => {
        const error = document.getElementById('error');
        const island = document.getElementById('island');
        if (timerInterval) clearInterval(timerInterval);

        if (!game.game_over()) {
          document.getElementById('board').style.display = 'none';
          document.getElementById('gameHeader').style.display = 'none';
          document.getElementById('historyPanel').style.display = 'none';
          document.getElementById('hero').style.display = 'flex';
          document.getElementById('container').style.display = 'flex';

          if (game.history().length === 0 && error.style.display !== 'block') {
            error.textContent = 'Connection closed.';
            error.className = 'error';
            error.style.display = 'block';
          }
        }

        if (game.history().length > 0) {
            error.style.display = 'block';
            if (state === 0) {
                error.textContent = 'Game ended.';
                error.className = 'success';
                island.style.display = 'none';
            }
            if (state === 1) {
                island.textContent = 'You won!';
                island.style.background = 'var(--success)';
                island.style.display = 'block';
            }
            if (state === 2) {
                island.textContent = 'You lost!';
                island.style.background = 'var(--error)';
                island.style.display = 'block';
            }
            if (state === 3) {
                island.textContent = 'Draw!';
                island.style.background = '#f59e0b';
                island.style.display = 'block';
            }
        } else {
            error.textContent = 'Game not found.';
            error.className = 'error';
            error.style.display = 'block';
            island.style.display = 'none';

            setTimeout(() => {
              window.location.href = '/';
            }, 5000);
        }
      };

      function showPromotionMenu(source, target) {
        const promotionMenu = document.getElementById('promotionMenu');
        promotionMenu.style.display = 'grid';

        const pieces = ['q', 'r', 'b', 'n'];
        const color = game.get(target).color;

        promotionMenu.innerHTML = '';

        pieces.forEach(piece => {
          const button = document.createElement('button');
          const img = document.createElement('img');
          img.src = `https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${color}${piece.toLocaleLowerCase()}.png`;
          img.alt = piece.toLowerCase();

          button.appendChild(img);
          button.onclick = () => {
            promotionMenu.style.display = 'none';
            game.undo();
            const move = game.move({
              from: source,
              to: target,
              promotion: piece
            });
            if (move !== null) {
              board.position(game.fen());
              updateHistory();
              ws.send(source + target + piece);
            }
          };
          promotionMenu.appendChild(button);
        });
      }

      let selected = null;
      let draggable = true;
      var $board = $('#board')
      function onDrop(source, target) {
        if (!source) return;
          const piece = game.get(source).type;
          const move = game.move({
            from: source,
            to: target,
            promotion: 'q'
          });

          if (target !== source && selected !== source)
            removeMoves();

          if (source == target)
            if (selected !== source) {
              $board.find('.square-' + selected).removeClass('highlight');
              $board.find('.square-' + source).addClass('highlight');
              selected = source;
            } else {
              $board.find('.square-' + source).removeClass('highlight');
              removeMoves();
              selected = null;
            }

          if (move === null) return 'snapback';
          selected = null;
          updateHistory();
          removeMoves();

          /*
          if (piece === 'p' && ((source[1] === '7' && target[1] === '8') || (source[1] === '2' && target[1] === '1'))) {
            showPromotionMenu(source, target);
            return;
          }
          */

          if (ws.readyState === WebSocket.OPEN) {
            ws.send(source + target);
          }

          if ((source === "e1" && (target === "g1" || target === "c1")) || (source === "e8" && (target === "g8" || target === "c8"))) {
            setTimeout(() => board.position(game.fen()), 200);
          }

          removeHighlights();
          $board.find('.square-' + source).addClass('highlight');
          $board.find('.square-' + target).addClass('highlight');
          draggable = false;
      }

      var config = {
        draggable,
        showNotation: false,
        position: 'start',
        orientation: "black",
        onDragStart: (source, piece, position, orientation) => {
          board.draggable = draggable;
         if (game.game_over() || !draggable) return false
         if ((board.orientation() === 'white' && piece.search(/^b/) !== -1) ||
         (board.orientation() === 'black' && piece.search(/^w/) !== -1)) {
           return false
          }

          document.querySelectorAll('#board .square-55d63').forEach(square => {
            square.addEventListener('click', (e) => {
              if (viewingIndex !== -1) return;
              const target = e.currentTarget.getAttribute('data-square')
              onDrop(selected, target);
              board.position(game.fen());
            });
          });

          highlightPossibleMoves(source);
        },
        onDrop,
        pieceTheme: (piece) => {
          const formatted = piece.toLowerCase()
          return `https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${formatted}.png`
        }
      };

      function removeHighlights() {
        $board.find('.square-55d63')
        .removeClass('highlight')
      }


      function highlightPossibleMoves(square) {
        removeMoves();

        const moves = game.moves({
          square: square,
          verbose: true
        });

        moves.forEach(move => {
          addMoves(move.to);
        });
      }

      function addMoves(square) {
        const squareElement = document.querySelector(`.square-${square}`);
        if (squareElement) {
          const highlight = document.createElement('div');
          highlight.className = 'highlight-square';
          squareElement.appendChild(highlight);
        }
      }

      function removeMoves() {
        const highlights = document.querySelectorAll('.highlight-square');
        highlights.forEach(highlight => {
          highlight.parentNode.removeChild(highlight);
        });
      }

      board = Chessboard('board', config);
      $(window).resize(board.resize);
    }

    function connectWithCode() {
      let code = document.getElementById('codeInput').value || "online";
      code = code.toUpperCase();
      window.location.href = "/" + code;
    }

    function setRandomFavicon() {
      const pieces = ['wk', 'wq', 'wr', 'wb', 'wn', 'wp'];
      const randomPiece = pieces[Math.floor(Math.random() * pieces.length)];
      const faviconUrl = `https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${randomPiece}.png`;

      const link = document.createElement('link');
      link.rel = 'icon';
      link.href = faviconUrl;
      document.head.appendChild(link);

      const logo = document.getElementById('gameLogo');
      if (logo) {
        logo.src = faviconUrl;
      }
    }

    setRandomFavicon();
    const urlParams = new URLSearchParams(window.location.search);
    const param = urlParams.get('code');
    const code = window.location.pathname.substring(1).toUpperCase();

    if (param) {
      window.location.href = "/" + param.toUpperCase();
    } else if (code && code !== "") {
      main(code);
    } else {
      document.getElementById('container').style.display = 'flex';
    }
  </script>

</body>
</html>
