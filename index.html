<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Master</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
        integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2hBLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU"
        crossorigin="anonymous">

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"
          integrity="sha384-ZvpUoO/+PpLXR1lu4jmpXWu80pZlYUAfxl5NsBMWOEPSjUn/6Z/hRTt8+pR6L4N2"
          crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"
          integrity="sha384-8Vi8VHwn3vjQ9eUHUxex3JSN/NFqUg3QbPyX8kWyb93+8AC/pPWTzj+nHtbC5bxD"
          crossorigin="anonymous"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"
          integrity="sha384-s3XgLpvmHyscVpijnseAmye819Ee3yaGa8NxstkJVyA6nuDFjt59u1QvuEl/mecz"
          crossorigin="anonymous"></script>

  <style>
    :root {
      --bg-color: #0c0c0c;
      --card-bg: #161616;
      --primary: oklch(48% .23 264);
      --primary-hover: oklch(42% .23 264);
      --highlight: oklch(80.9% .105 251.813);
      --text-main: #ffffff;
      --text-muted: #a1a1aa;
      --error: #ef4444;
      --success: #22c55e;
      --border: #27272a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      line-height: 1.5;
      position: relative;
    }

    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.2;
      pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1.5px, transparent 1.5px),
        linear-gradient(90deg, var(--border) 1.5px, transparent 1.5px);
      background-size: 25vw 25vh;
    }

    .bg-pattern::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(rgba(39, 39, 42, 0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(39, 39, 42, 0.5) 1px, transparent 1px);
      background-size: 5vw 5vh; /* Smaller sub-grid */
    }

    #gameHeader {
      position: fixed;
      top: 3rem;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 100;
      display: none;
      pointer-events: none;
    }

    #gameHeader h2 {
      font-family: 'IBM Plex Serif', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.2rem;
      color: var(--text-main);
      opacity: 1;
      text-transform: uppercase;
      margin: 0;
    }

    h1 {
      font-family: 'IBM Plex Serif', serif;
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      background: linear-gradient(to bottom, #fff 40%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 10;
    }

    .hero-container {
      text-align: center;
      max-width: 800px;
      padding: 2rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.25rem;
      margin-bottom: 2.5rem;
    }

    #codeInputContainer {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 2.5rem;
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      box-shadow:
        0 0 0 1px var(--border),
        0 25px 50px -12px rgba(0, 0, 0, 0.7),
        0 15px 30px -5px rgba(0, 0, 0, 0.4);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      text-align: left;
    }

    label {
      font-size: 0.96rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    input[type="text"] {
      background: #000;
      border: 1px solid var(--border);
      color: #fff;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      width: 100%;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    button {
      background-color: var(--primary);
      color: white;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      transition: all 0.1s ease;
      box-shadow: hsl(219, 93%, 20%) 0 -2px 0 0 inset, rgba(0, 0, 0, 0.4) 0 1px 3px 0;
      user-select: none;
    }

    button:hover {
      background-color: var(--primary-hover);
      box-shadow: none;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: none;
    }

    button kbd {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      padding: 0 4px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 4px;
      display: inline-flex;
      align-items: center;
      height: 18px;
    }

    #board {
      width: 40vw;
      max-width: 100%;
      display: none;
      box-shadow:
        0 0 0 1px var(--border),
        0 20px 50px -12px rgba(0, 0, 0, 0.8),
        0 10px 20px -5px rgba(0, 0, 0, 0.5);
    }

    .white-1e1d7 {
      background-color: #ffffff !important;
      color: var(--primary) !important;
    }

    .black-3c85d {
      background-color: var(--primary) !important;
      color: #ffffff !important;
    }

    .highlight {
      box-shadow: inset 0 0 0 5px var(--highlight) !important;
    }

    #errorMessage {
      margin-top: 1.5rem;
      font-weight: 500;
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
    }

    #errorMessage.error {
      color: var(--error);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    #errorMessage.success {
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    #codeBanner {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 600;
      color: var(--text-main);
      display: none;
      z-index: 100;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    #promotionMenu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 1rem;
      border-radius: 1rem;
      z-index: 1000;
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    #promotionMenu button {
      background: #27272a;
      padding: 0.5rem;
    }

    #promotionMenu img {
      width: 60px;
      height: 60px;
    }

    .highlight-square {
      background-color: var(--highlight);
      opacity: 0.8;
      border-radius: 50%;
      position: absolute;
      width: 20%;
      height: 20%;
      top: 40%;
      left: 40%;
      z-index: 1;
      pointer-events: none;
      box-shadow: 0 0 10px var(--highlight);
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 2.8rem;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      #board {
        width: 95vw;
        margin: 1rem auto;
      }
      #codeBanner {
        bottom: 1.5rem;
        padding: 0.6rem 1.2rem;
        font-size: 0.85rem;
        width: auto;
        max-width: 90vw;
      }
    }
  </style>
</head>
<body>

  <div class="bg-pattern"></div>

  <div id="gameHeader">
    <h2>Chess Master</h2>
  </div>

  <div class="hero-container" id="hero">
    <h1>CHESS MASTER</h1>
    <p class="subtitle">“Challenge the Future, One Move at a Time”</p>
    <div id="codeInputContainer">
      <div class="input-group">
        <label for="codeInput">Game Code</label>
        <input type="text" id="codeInput" placeholder="Enter code or just enter...">
      </div>
      <button onclick="connectWithCode()">
          <svg style="transform: rotate(-90deg);" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
          Enter Game
        </button>
    </div>
  </div>

  <div id="board"></div>
  <div id="promotionMenu"></div>
  <p id="errorMessage"></p>
  <div id="codeBanner"></div>

  <script>
    function main(code) {
      var board = null;
      var game = new Chess();
      var state = 0;
      var level = 0;

      const wsUrl = `ws${window.location.protocol === "https:" ? "s" : ""}://${window.location.host}?code=${code}`;
      const ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        console.log(`Connected to WebSocket with code: ${code}`);
      };

      ws.onmessage = async (message) => {
        const move = message.data.toString();
        console.log(move);

        if (["valid", "invalid"].includes(move))
          return;

        if (move.startsWith("code")) {
          const gameCode = move.split(" ")[1];
          const codeBanner = document.getElementById('codeBanner');
          codeBanner.textContent = `Code: ${gameCode}`;
          codeBanner.style.display = 'block';

          localStorage.removeItem("code");
          board.orientation('white');
        }

        if (move === "stockfish") {
          level = Number(localStorage.getItem("level") || "1");
          ws.send("level " + level);
          return;
        }

        if (move === "start" || move.startsWith("code")) {
          console.log("Game started.");
          document.getElementById('hero').style.display = 'none';
          document.getElementById('gameHeader').style.display = 'block';
          document.getElementById('board').style.display = 'block';
          return;
        }

        if (move.startsWith("position")) {
          game.load(move.replace("position ", ""));
          board.position(game.fen());
          return;
        }

        if (move === "win" || move === "lose" || move === "draw") {
          if (move === "win") {
            if (level > 0)
              localStorage.setItem("level", level + 1);
            state = 1;
          }
          if (move === "lose")
            state = 2;
          if (move === "draw")
            state = 3

          ws.close();
          return;
        }

        if (level > 0) {
          const codeBanner = document.getElementById('codeBanner');
          codeBanner.textContent = `Level: ${level}`;
          codeBanner.style.display = 'block';
        }

        const from = move.slice(0, 2);
        const to = move.slice(2, 4);
        const promotion = move.slice(4, 5);

        const moveResult = game.move({
          from: from,
          to: to,
          promotion: promotion
        });

        if (moveResult !== null) {
          await new Promise(r => setTimeout(r, 100));
          board.position(game.fen());
          removeHighlights();
          $board.find('.square-' + from).addClass('highlight');
          $board.find('.square-' + to).addClass('highlight');
          await new Promise(r => setTimeout(r, 150));
          draggable = true;
        } else {
          console.log('Invalid move:', move);
        }

      };

      ws.onclose = () => {
        const errorMessage = document.getElementById('errorMessage');
        const codeBanner = document.getElementById('codeBanner');
        localStorage.removeItem("code");

        if (!game.game_over()) {
          document.getElementById('board').style.display = 'none';
          document.getElementById('gameHeader').style.display = 'none';
          document.getElementById('hero').style.display = 'block';
          document.getElementById('codeInputContainer').style.display = 'flex';
        }

        if (game.history().length > 0) {
            errorMessage.style.display = 'block';
            if (state === 0) {
                errorMessage.textContent = 'Game ended.';
                errorMessage.className = 'success';
                codeBanner.style.display = 'none';
            }
            if (state === 1) {
                codeBanner.textContent = 'You won!';
                codeBanner.style.background = 'var(--success)';
                codeBanner.style.display = 'block';
            }
            if (state === 2) {
                codeBanner.textContent = 'You lost!';
                codeBanner.style.background = 'var(--error)';
                codeBanner.style.display = 'block';
            }
            if (state === 3) {
                codeBanner.textContent = 'Draw!';
                codeBanner.style.background = '#f59e0b';
                codeBanner.style.display = 'block';
            }
        } else {
            errorMessage.textContent = 'Game not found.';
            errorMessage.className = 'error';
            errorMessage.style.display = 'block';
            codeBanner.style.display = 'none';
        }
      };

      function showPromotionMenu(source, target) {
        const promotionMenu = document.getElementById('promotionMenu');
        promotionMenu.style.display = 'grid';

        const pieces = ['q', 'r', 'b', 'n'];
        const color = game.get(target).color;

        promotionMenu.innerHTML = '';

        pieces.forEach(piece => {
          const button = document.createElement('button');
          const img = document.createElement('img');
          img.src = `https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${color}${piece.toLocaleLowerCase()}.png`;
          img.alt = piece.toLowerCase();

          button.appendChild(img);
          button.onclick = () => {
            promotionMenu.style.display = 'none';
            game.undo();
            const move = game.move({
              from: source,
              to: target,
              promotion: piece
            });
            if (move !== null) {
              board.position(game.fen());
              ws.send(source + target + piece);
            }
          };
          promotionMenu.appendChild(button);
        });
      }

      let selected = null;
      let draggable = true;
      var $board = $('#board')
      function onDrop(source, target) {
        if (!source) return;
          const piece = game.get(source).type;
          const move = game.move({
            from: source,
            to: target,
            promotion: 'q'
          });

          if (target !== source && selected !== source)
            removeMoves();

          if (source == target)
            if (selected !== source) {
              $board.find('.square-' + selected).removeClass('highlight');
              $board.find('.square-' + source).addClass('highlight');
              selected = source;
            } else {
              $board.find('.square-' + source).removeClass('highlight');
              removeMoves();
              selected = null;
            }

          if (move === null) return 'snapback';
          selected = null;
          removeMoves();

          /*
          if (piece === 'p' && ((source[1] === '7' && target[1] === '8') || (source[1] === '2' && target[1] === '1'))) {
            showPromotionMenu(source, target);
            return;
          }
          */

          if (ws.readyState === WebSocket.OPEN) {
            ws.send(source + target);
          }

          if ((source === "e1" && (target === "g1" || target === "c1")) || (source === "e8" && (target === "g8" || target === "c8"))) {
            setTimeout(() => board.position(game.fen()), 200);
          }

          removeHighlights();
          $board.find('.square-' + source).addClass('highlight');
          $board.find('.square-' + target).addClass('highlight');
          draggable = false;
      }

      var config = {
        draggable,
        showNotation: false,
        position: 'start',
        orientation: "black",
        onDragStart: (source, piece, position, orientation) => {
          board.draggable = draggable;
         if (game.game_over() || !draggable) return false
         if ((board.orientation() === 'white' && piece.search(/^b/) !== -1) ||
         (board.orientation() === 'black' && piece.search(/^w/) !== -1)) {
           return false
          }

          document.querySelectorAll('#board .square-55d63').forEach(square => {
            square.addEventListener('click', (e) => {
              const target = e.currentTarget.getAttribute('data-square')
              onDrop(selected, target);
              board.position(game.fen());
            });
          });

          highlightPossibleMoves(source);
        },
        onDrop,
        pieceTheme: (piece) => {
          const formatted = piece.toLowerCase()
          return `https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${formatted}.png`
        }
      };

      function removeHighlights() {
        $board.find('.square-55d63')
        .removeClass('highlight')
      }


      function highlightPossibleMoves(square) {
        removeMoves();

        const moves = game.moves({
          square: square,
          verbose: true
        });

        moves.forEach(move => {
          addMoves(move.to);
        });
      }

      function addMoves(square) {
        const squareElement = document.querySelector(`.square-${square}`);
        if (squareElement) {
          const highlight = document.createElement('div');
          highlight.className = 'highlight-square';
          squareElement.appendChild(highlight);
        }
      }

      function removeMoves() {
        const highlights = document.querySelectorAll('.highlight-square');
        highlights.forEach(highlight => {
          highlight.parentNode.removeChild(highlight);
        });
      }

      board = Chessboard('board', config);
      $(window).resize(board.resize);
    }

    function connectWithCode() {
      let code = document.getElementById('codeInput').value || "online";
      code = code.toUpperCase();
      localStorage.setItem("code", code);

      main(code);
    }

    function setRandomFavicon() {
      const pieces = ['wk', 'wq', 'wr', 'wb', 'wn', 'wp'];
      const randomPiece = pieces[Math.floor(Math.random() * pieces.length)];
      const faviconUrl = `https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${randomPiece}.png`;

      const link = document.createElement('link');
      link.rel = 'icon';
      link.href = faviconUrl;
      document.head.appendChild(link);
    }

    setRandomFavicon();
    const urlParams = new URLSearchParams(window.location.search);
    const param = urlParams.get('code');
    const code = localStorage.getItem("code");

    if (param) {
      localStorage.setItem("code", code);
      window.location.search = "";
    }

    if (code) {
      main(code);
    } else {
      document.getElementById('codeInputContainer').style.display = 'flex';
    }
  </script>

</body>
</html>
